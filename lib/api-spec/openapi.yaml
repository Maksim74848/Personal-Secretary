openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Personal AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assistant
    description: AI assistant chat and core logic
  - name: contacts
    description: Contact management
  - name: events
    description: Calendar events
  - name: tasks
    description: Tasks and reminders
  - name: status
    description: User availability status
  - name: telegram
    description: Telegram bot settings
  - name: rules
    description: Assistant behavior rules
  - name: memory
    description: Assistant memory entries
  - name: logs
    description: Activity and conversation logs
  - name: dashboard
    description: Dashboard summary

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- DASHBOARD ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # --- ASSISTANT CHAT ---
  /assistant/chat:
    post:
      operationId: sendMessage
      tags: [assistant]
      summary: Send a message to the AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /assistant/conversations:
    get:
      operationId: getConversations
      tags: [assistant]
      summary: List conversation sessions
      responses:
        "200":
          description: List of conversation sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /assistant/conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [assistant]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  /assistant/draft-response:
    post:
      operationId: draftAutoResponse
      tags: [assistant]
      summary: Draft an auto-response for an incoming message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftResponseInput"
      responses:
        "200":
          description: Draft response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"

  # --- CONTACTS ---
  /contacts:
    get:
      operationId: getContacts
      tags: [contacts]
      summary: List all contacts
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a new contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- CALENDAR EVENTS ---
  /events:
    get:
      operationId: getEvents
      tags: [events]
      summary: List calendar events
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get an event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- TASKS ---
  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/complete:
    patch:
      operationId: completeTask
      tags: [tasks]
      summary: Mark a task as complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  # --- USER STATUS ---
  /status:
    get:
      operationId: getUserStatus
      tags: [status]
      summary: Get current user availability status
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatus"
    put:
      operationId: setUserStatus
      tags: [status]
      summary: Set user availability status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStatusInput"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatus"

  # --- TELEGRAM SETTINGS ---
  /telegram/settings:
    get:
      operationId: getTelegramSettings
      tags: [telegram]
      summary: Get Telegram bot settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramSettings"
    put:
      operationId: updateTelegramSettings
      tags: [telegram]
      summary: Update Telegram bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramSettings"

  /telegram/test:
    post:
      operationId: testTelegramConnection
      tags: [telegram]
      summary: Test Telegram bot connection
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  # --- ASSISTANT RULES ---
  /rules:
    get:
      operationId: getRules
      tags: [rules]
      summary: List assistant behavior rules
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssistantRule"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a new rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRuleInput"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantRule"

  /rules/{id}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantRuleUpdate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantRule"
    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- MEMORY ---
  /memory:
    get:
      operationId: getMemoryEntries
      tags: [memory]
      summary: List assistant memory entries
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryEntry"
    post:
      operationId: createMemoryEntry
      tags: [memory]
      summary: Add a memory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"

  /memory/{id}:
    patch:
      operationId: updateMemoryEntry
      tags: [memory]
      summary: Update a memory entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryEntryUpdate"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
    delete:
      operationId: deleteMemoryEntry
      tags: [memory]
      summary: Delete a memory entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- LOGS ---
  /logs:
    get:
      operationId: getLogs
      tags: [logs]
      summary: Get activity logs
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Logs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"
    delete:
      operationId: clearLogs
      tags: [logs]
      summary: Clear all logs
      responses:
        "204":
          description: Cleared

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    DashboardSummary:
      type: object
      required: [pendingTasks, todayEvents, totalContacts, recentMessages, currentStatus, upcomingDeadlines]
      properties:
        pendingTasks:
          type: integer
        todayEvents:
          type: integer
        totalContacts:
          type: integer
        recentMessages:
          type: integer
        currentStatus:
          type: string
        upcomingDeadlines:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    # Chat / Assistant
    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        conversationId:
          type: ["integer", "null"]
        voiceTranscript:
          type: ["boolean", "null"]

    ChatMessage:
      type: object
      required: [id, role, content, createdAt, conversationId]
      properties:
        id:
          type: integer
        role:
          type: string
        content:
          type: string
        conversationId:
          type: integer
        createdAt:
          type: string

    Conversation:
      type: object
      required: [id, title, createdAt, messageCount]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
        messageCount:
          type: integer
        lastMessage:
          type: ["string", "null"]

    DraftResponseInput:
      type: object
      required: [senderName, messageContent]
      properties:
        senderName:
          type: string
        messageContent:
          type: string
        contactId:
          type: ["integer", "null"]

    DraftResponse:
      type: object
      required: [draft, requiresConfirmation, reason]
      properties:
        draft:
          type: string
        requiresConfirmation:
          type: boolean
        reason:
          type: string
        alternatives:
          type: array
          items:
            type: string

    # Contacts
    Contact:
      type: object
      required: [id, name, priority, permissionLevel, tone, listType, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        identifier:
          type: ["string", "null"]
        telegramUsername:
          type: ["string", "null"]
        priority:
          type: string
        permissionLevel:
          type: string
        tone:
          type: string
        listType:
          type: string
        autoResponseEnabled:
          type: boolean
        autoResponseTemplate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ContactInput:
      type: object
      required: [name, priority, permissionLevel, tone, listType]
      properties:
        name:
          type: string
        identifier:
          type: string
        telegramUsername:
          type: string
        priority:
          type: string
        permissionLevel:
          type: string
        tone:
          type: string
        listType:
          type: string
        autoResponseEnabled:
          type: boolean
        autoResponseTemplate:
          type: string
        notes:
          type: string

    ContactUpdate:
      type: object
      properties:
        name:
          type: string
        identifier:
          type: string
        telegramUsername:
          type: string
        priority:
          type: string
        permissionLevel:
          type: string
        tone:
          type: string
        listType:
          type: string
        autoResponseEnabled:
          type: boolean
        autoResponseTemplate:
          type: string
        notes:
          type: string

    # Calendar Events
    CalendarEvent:
      type: object
      required: [id, title, startTime, endTime, allDay, recurring, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: string
        allDay:
          type: boolean
        recurring:
          type: boolean
        recurringPattern:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        reminder:
          type: ["integer", "null"]
        createdAt:
          type: string

    CalendarEventInput:
      type: object
      required: [title, startTime, endTime]
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        allDay:
          type: boolean
        recurring:
          type: boolean
        recurringPattern:
          type: string
        location:
          type: string
        reminder:
          type: integer

    CalendarEventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        allDay:
          type: boolean
        recurring:
          type: boolean
        recurringPattern:
          type: string
        location:
          type: string
        reminder:
          type: integer

    # Tasks
    Task:
      type: object
      required: [id, title, status, priority, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: ["string", "null"]
        reminder:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]

    TaskInput:
      type: object
      required: [title, priority]
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        dueDate:
          type: string
        reminder:
          type: string
        tags:
          type: string

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
        reminder:
          type: string
        tags:
          type: string

    # User Status
    UserStatus:
      type: object
      required: [id, status, context, updatedAt]
      properties:
        id:
          type: integer
        status:
          type: string
        context:
          type: string
        customMessage:
          type: ["string", "null"]
        availableUntil:
          type: ["string", "null"]
        updatedAt:
          type: string

    UserStatusInput:
      type: object
      required: [status, context]
      properties:
        status:
          type: string
        context:
          type: string
        customMessage:
          type: string
        availableUntil:
          type: string

    # Telegram Settings
    TelegramSettings:
      type: object
      required: [id, enabled, botConnected, autoReplyEnabled, forwardAllMessages, requireConfirmation]
      properties:
        id:
          type: integer
        enabled:
          type: boolean
        botToken:
          type: ["string", "null"]
        botConnected:
          type: boolean
        botUsername:
          type: ["string", "null"]
        autoReplyEnabled:
          type: boolean
        forwardAllMessages:
          type: boolean
        requireConfirmation:
          type: boolean
        defaultReplyTemplate:
          type: ["string", "null"]
        updatedAt:
          type: string

    TelegramSettingsInput:
      type: object
      properties:
        enabled:
          type: boolean
        botToken:
          type: string
        autoReplyEnabled:
          type: boolean
        forwardAllMessages:
          type: boolean
        requireConfirmation:
          type: boolean
        defaultReplyTemplate:
          type: string

    ConnectionTestResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        botUsername:
          type: ["string", "null"]

    # Assistant Rules
    AssistantRule:
      type: object
      required: [id, title, description, category, enabled, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        createdAt:
          type: string

    AssistantRuleInput:
      type: object
      required: [title, description, category]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer

    AssistantRuleUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer

    # Memory
    MemoryEntry:
      type: object
      required: [id, content, category, createdAt]
      properties:
        id:
          type: integer
        content:
          type: string
        category:
          type: string
        source:
          type: ["string", "null"]
        confidence:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    MemoryEntryInput:
      type: object
      required: [content, category]
      properties:
        content:
          type: string
        category:
          type: string
        source:
          type: string
        confidence:
          type: integer

    MemoryEntryUpdate:
      type: object
      properties:
        content:
          type: string
        category:
          type: string
        confidence:
          type: integer

    # Activity Logs
    ActivityLog:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        message:
          type: string
        metadata:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        createdAt:
          type: string
